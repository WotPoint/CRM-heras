meta:
  environment: node
  toolchain:
    name: npm
    version: "20"

build:
  skip: false
  additionalCommands:
    - "cd frontend && npm ci --include=dev && npm run build"
    - "cd backend && npm ci --include=dev && npm run build"
  artifacts:
    "*": /

run:
  command: "cd /app/backend && npm start"
  persistenceMount: /storage
  containerPort: "3000"
  servicePort: "80"
